name: Release

on: push # workflow_dispatch

permissions:
  checks: read
  contents: write
  issues: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check_semantic_release:
    name: Check semantic release
    timeout-minutes: 10
    runs-on: ubuntu-24.04

    outputs:
      new_release_published: ${{ steps.semantic-release.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic-release.outputs.new_release_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14

      - name: Semantic release dry run
        id: semantic-release
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
          extra_plugins: conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Wait for tests to complete
      #   if: steps.semantic-release.outputs.new_release_published == 'true'
      #   uses: lewagon/wait-on-check-action@v1.3.4
      #   with:
      #     ref: ${{ github.sha }}
      #     repo-token: ${{ secrets.GITHUB_TOKEN }}
      #     check-regexp: Test

  build_rust_cli_tool:
    name: Build Rust CLI tool
    timeout-minutes: 120

    needs: check_semantic_release
    # if: needs.check_semantic_release.outputs.new_release_published == 'true'

    strategy:
      matrix:
        target:
          # - aarch64-apple-darwin
          - aarch64-unknown-linux-musl
          # - x86_64-apple-darwin
          # - x86_64-pc-windows-gnu
          # - x86_64-unknown-linux-musl
        include:
          # - runs-on: macos-14
          #   shell: bash
          #   target: aarch64-apple-darwin
          - runs-on: ubuntu-24.04
            shell: bash
            target: aarch64-unknown-linux-musl
            rust-flags: -C link-arg=-Wl,--build-id
          # - runs-on: macos-13
          #   shell: bash
          #   target: x86_64-apple-darwin
          # - runs-on: windows-2022
          #   shell: msys2 {0}
          #   target: x86_64-pc-windows-gnu
          # - runs-on: ubuntu-24.04
          #   shell: bash
          #   target: x86_64-unknown-linux-musl
          #   rust-flags: -C link-arg=-Wl,--build-id

    runs-on: ${{ matrix.runs-on }}

    env:
      CARGO_TERM_COLOR: always

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.86
          cache-workspaces: src/rust
          override: false

      - name: Setup MSYS2 (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        uses: msys2/setup-msys2@v2
        with:
          release: false

      - name: Setup Cargo in MSYS2 (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          echo 'export PATH="/c/Users/runneradmin/.cargo/bin:$PATH"' >> ~/.bash_profile
          source ~/.bash_profile
          rustup install 1.86-${{ matrix.target }}
          rustup default 1.86-${{ matrix.target }}
  
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install platform-specific dependencies (macOS)
        if: matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin'
        run: brew install nasm

      - name: Setup musl toolchain (Linux)
        if: matrix.target == 'aarch64-unknown-linux-musl' || matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt install nasm

          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            MUSL_ARCH=x86_64
          else
            MUSL_ARCH=aarch64
          fi

          wget -q https://musl.cc/$MUSL_ARCH-linux-musl-cross.tgz
          tar -xzf $MUSL_ARCH-linux-musl-cross.tgz
          mv $MUSL_ARCH-linux-musl-cross /opt/musl-cross
          echo "/opt/musl-cross/bin" >> $GITHUB_PATH

          ln -s /opt/musl-cross/bin/$MUSL_ARCH-linux-musl-gcc-ar /opt/musl-cross/bin/musl-ar
          ln -s /opt/musl-cross/bin/$MUSL_ARCH-linux-musl-g++ /opt/musl-cross/bin/musl-g++
          ln -s /opt/musl-cross/bin/$MUSL_ARCH-linux-musl-gcc /opt/musl-cross/bin/musl-gcc
          ln -s /opt/musl-cross/bin/$MUSL_ARCH-linux-musl-gcc-nm /opt/musl-cross/bin/musl-nm
          ln -s /opt/musl-cross/bin/$MUSL_ARCH-linux-musl-gcc-ranlib /opt/musl-cross/bin/musl-ranlib
          ln -s $(which pkg-config) /opt/musl-cross/bin/musl-pkg-config

          echo "PKG_CONFIG_PATH=/opt/musl-cross/$MUSL_ARCH-linux-musl/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install platform-specific dependencies (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          pacman -S --noconfirm --needed autotools cmake git mingw-w64-x86_64-gcc mingw-w64-x86_64-clang-libs nasm
          cp /mingw64/lib/gcc/x86_64-w64-mingw32/14.2.0/include/mm_malloc.h /mingw64/include

      # - uses: mxschmitt/action-tmate@v3
      #   if: matrix.target == 'aarch64-unknown-linux-musl'

      - name: Build libx264
        run: |
          cd ..
          git clone --branch stable https://code.videolan.org/videolan/x264.git
          cd x264

          if [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            PREFIX=/mingw64
          elif [[ "${{ matrix.target }}" = "aarch64-apple-darwin" || "${{ matrix.target }}" = "x86_64-apple-darwin" ]]; then
            PREFIX=/usr/local
          else
            export AR=musl-ar
            export CC=musl-gcc

            if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
              PREFIX=/opt/musl-cross/x86_64-linux-musl
              EXTRA_CONFIGURE_ARGS="--host=x86_64-linux-musl"
            else
              PREFIX=/opt/musl-cross/aarch64-linux-musl
              EXTRA_CONFIGURE_ARGS="--host=aarch64-linux-musl"
            fi
          fi

          ./configure \
            --enable-static --enable-pic --disable-cli --disable-swscale \
            --disable-lavf --disable-ffms --disable-gpac --disable-avs  \
            --disable-lsmash --disable-opencl --extra-cflags=-O3 \
            --prefix=$PREFIX $EXTRA_CONFIGURE_ARGS
          make -j$(nproc)

          if [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            make install
          else
            sudo make install
          fi

      - name: Fetch dependencies
        working-directory: src/rust
        run: cargo fetch --locked --target ${{ matrix.target }}

      - name: Set version number in Cargo.toml files
        working-directory: src/rust
        run: find . -name "Cargo.toml" -exec sed -i'' -E "s/version = \"0.0.0\"/version = \"0.15.0\"/" {} +

      - name: Build release binary
        working-directory: src/rust
        env:
          RUSTFLAGS: ${{ matrix.rust-flags }}
        run: |
          pkg-config --libs --static x264
          cargo build --release --offline --target ${{ matrix.target }} --package dcmfx_cli

      - name: Package
        run: |
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            BINARY_SUFFIX=".exe"
          else
            BINARY_SUFFIX=""
          fi

          ARCHIVE="dcmfx-v0.15.0-${{ matrix.target }}.tar.gz"
          cp src/rust/target/${{ matrix.target }}/release/dcmfx_cli$BINARY_SUFFIX dcmfx$BINARY_SUFFIX
          tar -czvf "$ARCHIVE" dcmfx$BINARY_SUFFIX

          openssl dgst -r -sha256 -out "$ARCHIVE".sha256 "$ARCHIVE"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dcmfx-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          if-no-files-found: error
          retention-days: 1

